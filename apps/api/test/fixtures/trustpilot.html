<!DOCTYPE html>
<html lang="pl">
<head><meta charset="utf-8"><title>Reviews of Example</title></head>
<body>
  <main>
    <section class="reviews">
      <article data-service-review-card-paper class="styles_reviewCard__abc">
        <div class="consumerInfo">
          <span data-consumer-name-typography>Jan Kowalski</span>
        </div>
        <div data-service-review-rating="5">
          <img alt="Rated 5 out of 5 stars" src="/star.svg">
        </div>
        <p data-service-review-text-typography>
          Bardzo dobra obsługa, paczka dotarła następnego dnia. Polecam!
        </p>
        <time datetime="2024-09-12T10:00:00Z">12 września 2024</time>
      </article>

      <article data-service-review-card-paper class="styles_reviewCard__abc">
        <div class="consumerInfo">
          <span data-consumer-name-typography>Anna Nowak</span>
        </div>
        <div data-service-review-rating="2">
          <img alt="Rated 2 out of 5 stars" src="/star.svg">
        </div>
        <p data-service-review-text-typography>
          Paczka się spóźniła o trzy dni i nikt nie odebrał reklamacji.
        </p>
        <time datetime="2024-09-10T08:00:00Z">10 września 2024</time>
      </article>

      <article data-service-review-card-paper class="styles_reviewCard__abc">
        <span data-consumer-name-typography>Piotr Zieliński</span>
        <div data-service-review-rating="4"></div>
        <p data-service-review-text-typography>Wszystko OK, choć aplikacja czasem się zawiesza.</p>
        <time datetime="2024-08-28T13:30:00Z">28 sierpnia 2024</time>
      </article>
    </section>
  </main>
</body>
</html>
